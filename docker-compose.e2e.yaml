services:
  postgres-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-room_booking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-room_booking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_PORT: 8080
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-10}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-2}
      DB_MAX_CONN_IDLE_TIME_SECONDS: ${DB_MAX_CONN_IDLE_TIME_SECONDS:-300}
      DB_MAX_CONN_LIFETIME_SECONDS: ${DB_MAX_CONN_LIFETIME_SECONDS:-1800}
      SLOT_GENERATION_WINDOW_DAYS: ${SLOT_GENERATION_WINDOW_DAYS:-30}
      SLOT_REFILL_INTERVAL_SECONDS: ${SLOT_REFILL_INTERVAL_SECONDS:-300}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-e2e:5432/${POSTGRES_DB:-room_booking}?sslmode=disable
    depends_on:
      postgres-e2e:
        condition: service_healthy

  smoke:
    image: golang:1.25-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      APP_BASE_URL: http://app-e2e:8080
      GOCACHE: /tmp/gocache
    depends_on:
      - app-e2e
    command: ["go", "test", "./tests/smoke", "-count=1", "-v"]
